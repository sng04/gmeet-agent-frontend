<template id="session-create">
  <div class="page">
    <!-- Loading State -->
    <div data-bind="pageLoading">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading project...</div>
      </div>
    </div>

    <!-- Content -->
    <div data-bind="pageContent" style="display:none">
      <div class="bc">
        <a href="#" data-action="backNav" data-bind="backLink">Project</a>
        <span class="sep">›</span>
        <span class="cur">New Session</span>
      </div>
      <div class="pg-hdr">
        <div>
          <h1>Start New Session</h1>
          <div class="pg-sub">Project: <strong data-bind="projectName">—</strong></div>
        </div>
      </div>
      <div data-bind="alertContainer"></div>
      <div class="card" style="max-width:600px">
        <div class="card-body">
          <div class="form-g">
            <label class="form-l">Session Name <span class="req">*</span></label>
            <input class="form-i" name="name" placeholder="e.g. Q3 Technical Architecture Review">
            <div class="form-h">Describes the meeting objective. Helps with retrospective analysis.</div>
          </div>
          <div class="form-g">
            <label class="form-l">Google Meet Link <span class="req">*</span></label>
            <input class="form-i" name="meeting_link" placeholder="https://meet.google.com/xxx-xxxx-xxx" required>
            <div class="form-h">Paste the Google Meet link for this session. The bot will automatically join the meeting.</div>
          </div>
          <div class="form-g">
            <label class="form-l">Description</label>
            <textarea class="form-ta" name="description" rows="2" placeholder="Optional notes about this session..."></textarea>
          </div>
          <div class="flex gap-3 mt-6" data-bind="formActions"></div>
          <div class="card mt-6" style="background:var(--gray-25);border-color:var(--gray-100)">
            <div class="card-body" style="padding:16px">
              <div class="text-sm fw-m text-p mb-4">How it works</div>
              <div class="text-sm text-t" style="line-height:1.7">
                1. Enter session name and optionally paste your Google Meet link<br>
                2. If meet link provided, bot joins the meeting using project's Gmail account<br>
                3. Audio is captured and transcribed in real-time<br>
                4. Client questions are detected → answers from knowledge base<br>
                5. Review retrospective analysis after session ends
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div data-bind="pageError" style="display:none"></div>
  </div>
</template>
