<template id="project-create">
  <div class="page">
    <div class="bc">
      <a href="#" data-action="backLink">Projects</a>
      <span class="sep">›</span>
      <span class="cur">New Project</span>
    </div>
    <div class="pg-hdr">
      <div>
        <h1>Create New Project</h1>
        <div class="pg-sub">Set up a new project with agent and Gmail credential configuration</div>
      </div>
    </div>
    <div data-bind="alertContainer"></div>
    <div class="card" style="max-width:680px">
      <div class="card-body">
        <div class="form-g">
          <label class="form-l">Project Name <span class="req">*</span></label>
          <input class="form-i" name="name" placeholder="e.g. Acme Corp Sales">
        </div>
        <div class="form-g">
          <label class="form-l">Description</label>
          <textarea class="form-ta" name="description" rows="3" placeholder="Brief description of the project scope and purpose..."></textarea>
        </div>
        <div class="form-g">
          <label class="form-l">Default Agent</label>
          <select class="form-sel" name="agent_id" data-bind="agentSelect">
            <option value="">Select agent...</option>
          </select>
          <div class="form-h">The agent that will be used by default for sessions in this project.</div>
        </div>
        <div class="form-g">
          <label class="form-l">Gmail Credential <span class="req">*</span></label>
          <select class="form-sel" name="bot_credential_id" data-bind="gmailSelect">
            <option value="">Select credential...</option>
          </select>
          <div class="form-h">The Gmail account this project uses to join Google Meet sessions. Only verified & active credentials are shown.</div>
        </div>
        <div class="flex gap-3 mt-6 jc-end" data-bind="formActions"></div>
      </div>
    </div>
  </div>
</template>
