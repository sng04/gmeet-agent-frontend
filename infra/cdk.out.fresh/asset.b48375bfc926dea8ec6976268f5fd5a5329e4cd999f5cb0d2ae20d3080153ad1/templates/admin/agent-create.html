<template id="agent-create">
  <div class="page">
    <div class="bc">
      <a href="#" data-action="navBack" data-to="agents">Agents</a>
      <span class="sep">›</span>
      <span class="cur">New Agent</span>
    </div>
    <div class="pg-hdr">
      <div>
        <h1>Create New Agent</h1>
        <div class="pg-sub">Configure a new meeting agent instance</div>
      </div>
    </div>
    <div data-bind="formError" style="display:none"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">
      <div class="card">
        <div class="card-hdr"><div class="text-md fw-sb">Agent Configuration</div></div>
        <div class="card-body">
          <form id="agent-form">
            <div class="form-g">
              <label class="form-l">Agent Name <span class="req">*</span></label>
              <input class="form-i" name="agent_name" placeholder="e.g. TechSales Bot" required>
            </div>
            <div class="form-g">
              <label class="form-l">Personality <span class="req">*</span></label>
              <select class="form-sel" name="personality_id" data-bind="personalitySelect">
                <option value="">Loading personalities...</option>
              </select>
              <div class="form-h">Communication style the agent uses when responding.</div>
            </div>
            <div class="divider"></div>
            <div class="form-g">
              <label class="form-l">Role Prompt <span class="req">*</span></label>
              <textarea class="form-ta" name="role_prompt" rows="5" placeholder="Describe who the agent is and how it should behave in meetings..."></textarea>
              <div class="form-h">Defines the agent's identity and overall behavior.</div>
            </div>
            <div class="form-g">
              <label class="form-l">Behavior Guidelines <span class="req">*</span></label>
              <textarea class="form-ta" name="behavior_guidelines" rows="5" placeholder="e.g. 1. Answer questions using the knowledge base. 2. Be concise..."></textarea>
              <div class="form-h">Step-by-step task instructions for the agent during meetings.</div>
            </div>
          </form>
        </div>
      </div>
      <div>
        <div class="card mb-4">
          <div class="card-hdr">
            <div class="text-md fw-sb">Test Prompt</div>
            <div class="text-xs text-t" data-bind="chatStatus">Fill in the form, then test how the agent responds</div>
          </div>
          <div class="chat-test-panel" style="border:none;border-radius:0">
            <div class="chat-test-msgs" data-bind="chatMsgs" style="min-height:280px;max-height:420px;overflow-y:auto">
              <div class="chat-test-row"><div class="chat-test-bubble ai-bubble" style="color:var(--gray-400)">Configure the agent on the left, then type a message below to see how it would respond.</div></div>
            </div>
            <div class="chat-test-input">
              <input type="text" placeholder="Type a test message..." data-bind="chatInput">
              <button data-action="chatSend">Send</button>
            </div>
          </div>
        </div>
        <div class="flex gap-3 jc-end">
          <button class="btn btn-s btn-lg" data-action="cancel">Cancel</button>
          <button class="btn btn-p btn-lg" data-action="create">Create Agent →</button>
        </div>
      </div>
    </div>
  </div>
</template>
