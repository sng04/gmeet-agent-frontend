<template id="dashboard">
  <div class="page">
    <div class="pg-hdr">
      <div>
        <h1>Dashboard</h1>
        <div class="pg-sub">Overview of your GMeet Agent system</div>
      </div>
    </div>

    <!-- Loading State -->
    <div data-bind="pageLoading">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading dashboard...</div>
      </div>
    </div>

    <!-- Content (hidden by default) -->
    <div data-bind="pageContent" style="display:none">
      <div class="g g4 mb-6" data-bind="statsGrid"></div>
      <div class="mb-6" data-bind="sessionsTable"></div>
      <div data-bind="qaTable"></div>
    </div>

    <!-- Error State -->
    <div data-bind="pageError" style="display:none"></div>
  </div>
</template>
