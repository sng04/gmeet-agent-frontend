<template id="gmail-edit">
  <div class="page">
    <div class="bc">
      <a href="#" data-action="navBack" data-to="gmail">Gmail Credentials</a>
      <span class="sep">›</span>
      <span class="cur">Edit Credential</span>
    </div>
    <div class="pg-hdr">
      <div>
        <h1>Edit Gmail Credential</h1>
        <div class="pg-sub" data-bind="emailDisplay">Loading...</div>
      </div>
    </div>
    <div class="card" style="max-width:560px">
      <div class="card-body">
        <div data-bind="errorMsg" class="mb-4" style="display:none;padding:12px;background:var(--err-50);border-radius:8px;color:var(--err-700);font-size:14px"></div>
        <div data-bind="successMsg" class="mb-4" style="display:none;padding:12px;background:var(--ok-50);border-radius:8px;color:var(--ok-700);font-size:14px"></div>

        <div class="form-g">
          <label class="form-l">Gmail Address</label>
          <input class="form-i" type="email" data-bind="email" disabled style="background:var(--gray-50)">
          <div class="form-h">Email address cannot be changed.</div>
        </div>
        <div class="form-g">
          <label class="form-l">Status</label>
          <div data-bind="statusToggle"></div>
          <div class="form-h">Enable or disable this credential for use in meetings.</div>
        </div>
        <div class="form-g">
          <label class="form-l">Warm Pool Size</label>
          <input class="form-i" type="number" data-bind="warmPoolSize" value="1" min="0" max="10" style="width:120px">
          <div class="form-h">Number of pre-started containers. Changing this will automatically adjust the pool.</div>
        </div>
        <div class="form-g">
          <label class="form-l">Current Pool Status</label>
          <div data-bind="poolStatus" class="text-sm text-t">Loading...</div>
        </div>
        <div class="flex gap-3 jc-end mt-6">
          <button class="btn btn-s btn-lg" data-action="cancel">Cancel</button>
          <button class="btn btn-p btn-lg" data-action="save">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</template>
