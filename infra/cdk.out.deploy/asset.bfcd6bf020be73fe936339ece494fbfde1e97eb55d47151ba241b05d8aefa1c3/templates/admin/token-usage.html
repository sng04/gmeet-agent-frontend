<template id="token-usage">
  <div class="page">
    <div class="pg-hdr">
      <div>
        <h1>Token Usage</h1>
        <div class="pg-sub">Monitor AI token consumption and costs</div>
      </div>
      <div class="pg-actions" data-bind="actions"></div>
    </div>
    <div class="g g3 mb-6" data-bind="statsGrid"></div>
    <div class="card mb-6">
      <div class="card-hdr">
        <div class="text-md fw-sb">Daily Token Usage</div>
      </div>
      <div class="card-body">
        <div class="tchart" data-bind="chart"></div>
      </div>
    </div>
    <div data-bind="table"></div>
  </div>
</template>
