<template id="gmail-create">
  <div class="page">
    <div class="bc">
      <a href="#" data-action="navBack" data-to="gmail">Gmail Credentials</a>
      <span class="sep">›</span>
      <span class="cur">Add Credential</span>
    </div>
    <div class="pg-hdr">
      <div>
        <h1>Add Gmail Credential</h1>
        <div class="pg-sub">Gmail account for project authentication</div>
      </div>
    </div>
    <div class="card" style="max-width:560px">
      <div class="card-body">
        <div data-bind="errorMsg" class="mb-4" style="display:none;padding:12px;background:var(--err-50);border-radius:8px;color:var(--err-700);font-size:14px"></div>

        <div class="form-g">
          <label class="form-l">Gmail Address <span class="req">*</span></label>
          <input class="form-i" type="email" data-bind="email" placeholder="bot-name@company-agents.com">
        </div>
        <div class="form-g">
          <label class="form-l">Password <span class="req">*</span></label>
          <div class="form-pwd-wrap">
            <input class="form-i" type="password" data-bind="password" placeholder="••••••••">
            <button class="pwd-toggle" data-action="pwdToggle" type="button">👁</button>
          </div>
          <div class="form-h">🔒 Stored encrypted via AWS KMS. Never displayed after saving.</div>
        </div>
        <div class="form-g">
          <label class="form-l">Warm Pool Size</label>
          <input class="form-i" type="number" data-bind="warmPoolSize" value="1" min="0" max="10" style="width:120px">
          <div class="form-h">Number of pre-started containers for faster meeting joins. Set to 0 to disable warm pool.</div>
        </div>
        <div class="flex gap-3 jc-end mt-6">
          <button class="btn btn-s btn-lg" data-action="cancel">Cancel</button>
          <button class="btn btn-p btn-lg" data-action="save">Save &amp; Verify</button>
        </div>
      </div>
    </div>
  </div>
</template>
