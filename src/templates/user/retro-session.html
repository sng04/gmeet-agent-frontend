<template id="retro-session">
  <div class="page">
    <!-- Loading State -->
    <div data-bind="pageLoading">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading session...</div>
      </div>
    </div>

    <!-- Content -->
    <div data-bind="pageContent" style="display:none">
      <div class="bc">
        <a href="#" data-action="backNav" data-bind="backLink">Project</a>
        <span class="sep">›</span>
        <span class="cur">Session Review</span>
      </div>
      <div class="pg-hdr">
        <div>
          <h1 data-bind="sessionName">Session</h1>
          <div class="pg-sub">Project: <span data-bind="projectName"></span></div>
        </div>
        <div class="pg-actions" data-bind="statusBadge">
          <span class="badge b-summary"><span class="dot"></span> Finished</span>
        </div>
      </div>
      <div class="sess-meta mb-5">
        <div class="sess-meta-item"><span>📁</span><strong>Project:</strong> <span data-bind="metaProject"></span></div><div class="sess-meta-div"></div>
        <div class="sess-meta-item"><span>🔗</span><strong>Meet:</strong> <a href="#" data-bind="metaMeetLink" data-external target="_blank" class="text-pri"></a></div><div class="sess-meta-div"></div>
        <div class="sess-meta-item"><span>⏱️</span><strong>Duration:</strong> <span data-bind="metaDuration"></span></div><div class="sess-meta-div"></div>
        <div class="sess-meta-item"><span>💬</span><strong>Q&A Pairs:</strong> <span data-bind="metaQA"></span></div><div class="sess-meta-div"></div>
        <div class="sess-meta-item"><span>📅</span><strong>Started:</strong> <span data-bind="metaStarted"></span></div><div class="sess-meta-div"></div>
        <div class="sess-meta-item"><span>🏁</span><strong>Ended:</strong> <span data-bind="metaEnded"></span></div><div class="sess-meta-div"></div>
        <div class="sess-meta-item"><span>📊</span><strong>Score:</strong> <span data-bind="metaScore"></span></div><div class="sess-meta-div"></div>
        <div class="sess-meta-item" id="sess-status-badge" data-bind="statusBadgeInline"></div>
      </div>
      <div>
        <div class="tabs">
          <div class="tab active" data-tab="summary">📋 Summary</div>
          <div class="tab" data-tab="qa">💬 Q&A Pairs</div>
          <div class="tab" data-tab="transcript">📝 Full Transcript</div>
          <div class="tab" data-tab="chat">🤖 AI Chat</div>
        </div>
        <div class="tab-c active" id="tab-summary">
          <div class="retro-s">
            <div class="retro-s-hdr">
              <div class="retro-s-icon" style="background:var(--pri-50);color:var(--pri-500)">📋</div>
              <div class="retro-s-title">Meeting Summary</div>
            </div>
            <div class="retro-s-body" data-bind="summaryContent">
              <p style="font-size:13px;color:var(--gray-600);line-height:1.6" data-bind="summaryBody"></p>
            </div>
          </div>
          <div class="retro-s">
            <div class="retro-s-hdr">
              <div class="retro-s-icon" style="background:var(--warn-50);color:var(--warn-500)">💡</div>
              <div class="retro-s-title">Areas for Improvement</div>
            </div>
            <div class="retro-s-body" data-bind="improvementsContent">
              <p style="font-size:13px;color:var(--gray-500);line-height:1.6">Loading...</p>
            </div>
          </div>
          <div class="retro-s">
            <div class="retro-s-hdr">
              <div class="retro-s-icon" style="background:var(--err-50);color:var(--err-500)">⚠️</div>
              <div class="retro-s-title">Missed Agenda Items</div>
            </div>
            <div class="retro-s-body" data-bind="missedItemsContent">
              <p style="font-size:13px;color:var(--gray-500);line-height:1.6">Loading...</p>
            </div>
          </div>
          <div class="retro-s">
            <div class="retro-s-hdr">
              <div class="retro-s-icon" style="background:var(--ok-50);color:var(--ok-500)">✅</div>
              <div class="retro-s-title">Action Items / Next Steps</div>
            </div>
            <div class="retro-s-body" data-bind="actionItemsContent">
              <p style="font-size:13px;color:var(--gray-500);line-height:1.6">Loading...</p>
            </div>
          </div>
          <div class="retro-s">
            <div class="retro-s-hdr">
              <div class="retro-s-icon" style="background:var(--info-50);color:var(--info-500)">📊</div>
              <div class="retro-s-title">Session Insights</div>
            </div>
            <div class="retro-s-body" data-bind="insightsContent">
              <p style="font-size:13px;color:var(--gray-600);line-height:1.6" data-bind="insightsBody"></p>
            </div>
          </div>
          <div class="retro-s">
            <div class="retro-s-hdr">
              <div class="retro-s-icon" style="background:var(--pri-50);color:var(--pri-500)">🎯</div>
              <div class="retro-s-title">Coaching Feedback</div>
            </div>
            <div class="retro-s-body" data-bind="retroFeedback">
              <div class="loading"><div class="loading-spinner"></div><div class="loading-text">Generating coaching feedback...</div></div>
            </div>
          </div>
        </div>
        <div class="tab-c" id="tab-qa">
          <div data-bind="qaList"></div>
          <div class="text-xs text-t" style="text-align:center;padding:12px" data-bind="qaCountText"></div>
        </div>
        <div class="tab-c" id="tab-transcript">
          <div class="card">
            <div class="card-hdr">
              <div class="text-md fw-sb">Full Transcript</div>
              <div class="text-xs text-t">Raw speech-to-text output</div>
            </div>
            <div class="card-body">
              <div class="tscript" data-bind="transcript"></div>
            </div>
          </div>
        </div>
        <div class="tab-c" id="tab-chat">
          <div class="card">
            <div class="card-hdr">
              <div class="text-md fw-sb">AI Chat</div>
              <div class="text-xs text-t">Ask questions about this meeting</div>
            </div>
            <div class="chat-test-panel" style="border:none;border-radius:0">
              <div class="chat-test-msgs" data-bind="chatMsgs" style="min-height:350px;max-height:500px;overflow-y:auto">
                <div class="chat-test-row"><div class="chat-test-bubble ai-bubble"><div class="agent-lbl">MeetAgent AI</div><div class="chat-test-body">I've analyzed this session. Ask me about key themes, missed points, or anything from the transcript.</div></div></div>
              </div>
              <div style="padding:8px 16px;border-top:1px solid var(--gray-100);display:flex;flex-wrap:wrap;gap:6px">
                <button class="ai-chip">Key themes?</button>
                <button class="ai-chip">Draft follow-up email</button>
                <button class="ai-chip">What was missed?</button>
              </div>
              <div class="chat-test-input">
                <input type="text" placeholder="Ask about this meeting..." data-bind="chatInput">
                <button data-action="chatSend">Send</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div data-bind="pageError" style="display:none"></div>
  </div>
</template>
