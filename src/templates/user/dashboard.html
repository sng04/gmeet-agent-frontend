<template id="dashboard">
  <div class="page">
    <div class="pg-hdr">
      <div>
        <h1>My Projects</h1>
        <div class="pg-sub">Select a project to view sessions and details</div>
      </div>
    </div>

    <!-- Live Widget (inlined) -->
    <div class="live-widget mb-6" data-bind="liveWidget" style="display:none">
      <div class="flex items-c jc-b">
        <div>
          <div class="live-badge-anim mb-4"><span class="live-dot-anim"></span>LIVE</div>
          <div class="live-widget-title" data-bind="liveTitle"></div>
          <div class="live-widget-sub" data-bind="liveSubtitle"></div>
        </div>
        <div style="font-size:48px;opacity:.15">📡</div>
      </div>
      <div class="live-widget-footer">
        <div class="flex gap-3 items-c">
          <div class="conn ok"><span class="conn-dot"></span> Connected <span class="conn-latency" data-bind="liveLatency"></span></div>
          <span class="text-xs text-t"><span data-bind="liveQaCount"></span> Q&A pairs generated</span>
        </div>
        <button class="btn btn-live" data-action="openLive">Open Live View →</button>
      </div>
    </div>

    <!-- Loading State -->
    <div data-bind="pageLoading">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading projects...</div>
      </div>
    </div>

    <!-- Content (hidden by default) -->
    <div data-bind="pageContent" style="display:none">
      <!-- Project Cards Grid -->
      <div class="g g2 mb-6" data-bind="projectsGrid"></div>

      <!-- Sessions Table -->
      <div data-bind="sessionsTable"></div>
    </div>

    <!-- Error State -->
    <div data-bind="pageError" style="display:none"></div>
  </div>
</template>
