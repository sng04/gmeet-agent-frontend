<template id="agents">
  <div class="page">
    <div class="pg-hdr">
      <div>
        <h1>Agents</h1>
        <div class="pg-sub">Configured meeting agent instances</div>
      </div>
      <div class="pg-actions" data-bind="actions"></div>
    </div>
    <div class="filters" data-bind="filters"></div>
    <div data-bind="loading" style="display:none">
      <div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading agents...</div></div>
    </div>
    <div data-bind="error" style="display:none"></div>
    <div data-bind="agentsList"></div>
  </div>
</template>
