<template id="qa-monitor">
  <div class="page">
    <div class="pg-hdr">
      <div>
        <h1>Q&A Monitor</h1>
        <div class="pg-sub">All question-answer pairs across sessions, in chronological order</div>
      </div>
    </div>
    <div class="filters" data-bind="filters"></div>
    <div class="g g3 mb-5" style="max-width:500px">
      <div class="stat" style="cursor:default">
        <div class="stat-label">Total Q&A Pairs</div>
        <div class="stat-val" data-bind="totalQA"></div>
      </div>
      <div class="stat" style="cursor:default">
        <div class="stat-label">Avg Confidence</div>
        <div class="stat-val" data-bind="avgConfidence"></div>
      </div>
      <div class="stat" style="cursor:default">
        <div class="stat-label">Sessions with Q&A</div>
        <div class="stat-val" data-bind="sessionsWithQA"></div>
      </div>
    </div>
    <div data-bind="qaList"></div>
  </div>
</template>
