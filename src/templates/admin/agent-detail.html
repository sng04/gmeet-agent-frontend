<template id="agent-detail">
  <div class="page">
    <div class="bc">
      <a href="#" data-action="navBack" data-to="agents">Agents</a>
      <span class="sep">›</span>
      <span class="cur" data-bind="agentName"></span>
    </div>
    <div class="agent-detail-hdr mb-6">
      <div class="agent-avatar">🤖</div>
      <div style="flex:1">
        <div class="flex items-c gap-3 mb-1">
          <h2 style="font-size:22px;font-weight:800" data-bind="agentTitle"></h2>
          <span class="badge" data-bind="statusBadge"></span>
        </div>
        <div class="text-xs text-t" data-bind="agentMeta"></div>
        <div class="text-xs text-t mt-1" data-bind="agentUpdated"></div>
      </div>
      <div class="flex gap-2" data-bind="actions"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start">
      <div>
        <div class="card mb-6">
          <div class="card-hdr">
            <div class="text-md fw-sb">Current Role</div>
            <div class="text-xs text-t mono" data-bind="roleDate"></div>
          </div>
          <div class="card-body" style="background:var(--gray-25)">
            <p style="font-size:13px;line-height:1.7;color:var(--gray-700);white-space:pre-wrap;font-family:var(--mono)" data-bind="roleText"></p>
          </div>
        </div>
        <div class="card mb-6">
          <div class="card-hdr"><div class="text-md fw-sb">Role History</div></div>
          <div data-bind="roleHistory"></div>
        </div>
      </div>
      <div>
        <div class="card mb-6">
          <div class="card-hdr"><div class="text-md fw-sb">Configuration</div></div>
          <div class="card-body">
            <div class="flex jc-b items-c" style="padding:6px 0;border-bottom:1px solid var(--gray-100)">
              <span class="text-xs text-t">Agent Name</span>
              <span class="text-sm fw-m" data-bind="configName"></span>
            </div>
            <div class="flex jc-b items-c" style="padding:6px 0;border-bottom:1px solid var(--gray-100)">
              <span class="text-xs text-t">Personality</span>
              <span class="text-sm fw-m" data-bind="configPersonality"></span>
            </div>
            <div class="flex jc-b items-c" style="padding:6px 0">
              <span class="text-xs text-t">Answering Tone</span>
              <span class="text-sm fw-m" data-bind="configTone"></span>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-hdr"><div class="text-md fw-sb">Assigned Projects</div></div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:10px" data-bind="projectsList"></div>
        </div>
      </div>
    </div>
  </div>
</template>
