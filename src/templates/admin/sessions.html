<template id="sessions">
  <div class="page">
    <div class="pg-hdr">
      <div>
        <h1>All Sessions</h1>
        <div class="pg-sub">View and manage all meeting sessions</div>
      </div>
    </div>

    <!-- Loading State -->
    <div data-bind="pageLoading">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading sessions...</div>
      </div>
    </div>

    <!-- Content -->
    <div data-bind="pageContent" style="display:none">
      <!-- Search & Filters -->
      <div class="filters mb-4">
        <input type="text" class="form-i" placeholder="Search sessions..." data-bind="searchInput" style="max-width:300px">
        <select class="form-sel" data-bind="statusFilter" style="max-width:160px">
          <option value="">All Status</option>
          <option value="live">Live</option>
          <option value="starting">Starting</option>
          <option value="finished">Finished</option>
          <option value="failed">Failed</option>
        </select>
      </div>

      <!-- Sessions Table -->
      <div data-bind="sessionsTable"></div>

      <!-- Empty State -->
      <div data-bind="emptyState" style="display:none">
        <div class="empty">
          <div class="empty-icon">📋</div>
          <div class="empty-title">No sessions found</div>
          <div class="empty-desc">Try adjusting your search or filters</div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div data-bind="pageError" style="display:none"></div>
  </div>
</template>
