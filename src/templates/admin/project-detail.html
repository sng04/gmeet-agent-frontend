<template id="project-detail">
  <div class="page">
    <div class="bc">
      <a href="#" class="nav-back" data-to="projects">Projects</a>
      <span class="sep">›</span>
      <span class="cur" data-bind="projectName">Project</span>
    </div>
    <div class="pg-hdr">
      <div>
        <h1 data-bind="title">Project Detail</h1>
        <div class="pg-sub" data-bind="description"></div>
      </div>
      <div class="pg-actions" data-bind="actions"></div>
    </div>

    <!-- Loading State -->
    <div data-bind="pageLoading">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading project...</div>
      </div>
    </div>

    <!-- Content (hidden by default) -->
    <div data-bind="pageContent" style="display:none">
      <!-- Live Session Banner (hidden until sessions load) -->
      <div class="card mb-6" data-bind="liveBanner" style="display:none;border-color:var(--err-500);background:var(--err-50)"></div>

      <!-- Stats -->
      <div class="g g4 mb-6">
        <div class="stat" style="cursor:default">
          <div class="stat-label">Default Agent</div>
          <div class="stat-val" style="font-size:15px;margin-top:4px" data-bind="statAgent"></div>
        </div>
        <div class="stat" style="cursor:default">
          <div class="stat-label">Gmail Credential</div>
          <div class="stat-val" style="font-size:11px;font-weight:500;margin-top:4px;font-family:var(--mono);word-break:break-all" data-bind="statGmail"></div>
        </div>
        <div class="stat" style="cursor:default">
          <div class="stat-label">Assigned Users</div>
          <div class="stat-val" data-bind="statUsers"></div>
        </div>
        <div class="stat" style="cursor:default">
          <div class="stat-label">Total Sessions</div>
          <div class="stat-val" data-bind="statSessions"></div>
        </div>
      </div>

      <!-- Knowledge Base Section -->
      <div class="kb-folder mb-6">
        <div class="kb-folder-hdr" data-action="kbToggle">
          <div class="flex items-c gap-3">
            <span style="font-size:18px">📚</span>
            <div>
              <div class="text-sm fw-sb">Knowledge Base</div>
              <div class="text-xs text-t" data-bind="kbMeta"></div>
            </div>
          </div>
          <div class="flex gap-2 items-c">
            <span class="text-xs text-t" data-bind="kbToggleText">▲ collapse</span>
            <input type="file" accept=".pdf,.md" data-bind="kbFileInput" style="display:none">
            <label class="upload-zone" data-action="kbUploadClick" style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;margin:0;border-style:dashed;border-width:1px;cursor:pointer;font-size:12px;color:var(--pri-500);background:var(--pri-25)">📤 Upload Doc</label>
          </div>
        </div>
        <div data-bind="kbContent"></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" data-tab="users">Assigned Users</div>
        <div class="tab" data-tab="sessions">Session History</div>
      </div>

      <!-- Users Tab -->
      <div class="tab-c active" data-bind="tabUsers">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div class="loading-text">Loading users...</div>
        </div>
      </div>

      <!-- Sessions Tab -->
      <div class="tab-c" data-bind="tabSessions">
        <!-- Sessions Loading -->
        <div data-bind="sessionsLoading">
          <div class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading sessions...</div>
          </div>
        </div>
        <!-- Sessions Content -->
        <div data-bind="sessionsContent" style="display:none">
          <div class="tbl-wrap">
            <table>
              <thead><tr><th>Session</th><th>Status</th><th>Meet Link</th><th>Q&A</th><th>Duration</th><th></th></tr></thead>
              <tbody data-bind="sessionsBody"></tbody>
            </table>
            <div class="tbl-foot" data-bind="sessionsFoot"></div>
          </div>
        </div>
        <!-- Sessions Empty -->
        <div data-bind="sessionsEmpty" style="display:none">
          <div class="empty">
            <div class="empty-icon">📋</div>
            <div class="empty-title">No sessions yet</div>
            <div class="empty-desc">Sessions will appear here when users create them</div>
          </div>
        </div>
        <!-- Sessions Error -->
        <div data-bind="sessionsError" style="display:none"></div>
      </div>
    </div>

    <!-- Error State (hidden by default) -->
    <div data-bind="pageError" style="display:none"></div>
  </div>
</template>
